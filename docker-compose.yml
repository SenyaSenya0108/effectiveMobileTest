services:
  nginx:
    container_name: nginx
    image: nginx:stable-alpine
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8081}/healthcheck"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - app-network
networks:
  app-network:
    name: app-network
    driver: bridge